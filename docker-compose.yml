version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: capto
      POSTGRES_USER: capto
      POSTGRES_PASSWORD: capto_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capto"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://capto:capto_dev_password@postgres:5432/capto
      JWT_SECRET: change-this-in-production
      ALLOWED_ORIGINS: http://localhost:3000,https://your-domain.com
      # Object storage (Replit sidecar in production):
      # PRIVATE_OBJECT_DIR: /bucket-name
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
